<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

    <title>
        Sistema Inteligente de Fiscalização
    </title>

    <!-- LEAFLET -->
    <link rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- MARKER CLUSTER -->
    <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />

    <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

    <!-- PAPAPARSE -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f1f5f9;
        }

        header {
            background: #0f172a;
            color: white;
            padding: 15px;
        }

        header h2 {
            font-size: 22px;
        }

        .dashboard {

            display: flex;
            gap: 10px;
            flex-wrap: wrap;

            padding: 10px;

            background: white;

            border-bottom: 1px solid #ddd;
        }

        .card {

            flex: 1;
            min-width: 180px;

            background: #f8fafc;

            padding: 15px;

            border-radius: 12px;

            border: 1px solid #e2e8f0;

            text-align: center;
        }

        .card h3 {
            font-size: 15px;
            color: #666;
        }

        .card p {
            margin-top: 10px;
            font-size: 28px;
            font-weight: bold;
        }

        .toolbar {

            display: flex;
            gap: 10px;
            flex-wrap: wrap;

            padding: 10px;

            background: white;

            border-bottom: 1px solid #ddd;
        }

        .toolbar input,
        .toolbar select,
        .toolbar button {

            padding: 10px;

            border-radius: 10px;

            border: 1px solid #ccc;
        }

        .toolbar button {

            background: #0f172a;

            color: white;

            cursor: pointer;
        }

        .toolbar button:hover {

            opacity: 0.9;
        }

        #map {

            width: 100%;

            height: calc(100vh - 210px);
        }

        .popup-img {

            width: 100%;

            max-width: 220px;

            border-radius: 12px;

            margin-top: 10px;
        }

        .status-licenciado {

            color: green;

            font-weight: bold;
        }

        .status-irregular {

            color: red;

            font-weight: bold;
        }

        .status-pendente {

            color: orange;

            font-weight: bold;
        }

        .popup-box {

            min-width: 230px;
        }

        .popup-box h3 {

            color: #0f172a;

            margin-bottom: 5px;
        }

        .popup-box hr {

            margin: 10px 0;
        }

        @media(max-width:768px){

            #map{

                height: calc(100vh - 320px);
            }
        }

    </style>

</head>

<body>

<header>

    <h2>
        📍 Sistema Inteligente de Fiscalização
    </h2>

</header>

<!-- DASHBOARD -->

<div class="dashboard">

    <div class="card">
        <h3>Total</h3>
        <p id="total">0</p>
    </div>

    <div class="card">
        <h3>Licenciados</h3>
        <p id="licenciados">0</p>
    </div>

    <div class="card">
        <h3>Irregulares</h3>
        <p id="irregulares">0</p>
    </div>

    <div class="card">
        <h3>Pendentes</h3>
        <p id="pendentes">0</p>
    </div>

</div>

<!-- BARRA -->

<div class="toolbar">

    <input
        type="text"
        id="pesquisa"
        placeholder="Pesquisar estabelecimento..."
    />

    <select id="filtro">

        <option value="">
            Todos os status
        </option>

        <option value="sim">
            Licenciado
        </option>

        <option value="nao">
            Irregular
        </option>

        <option value="pendente">
            Pendente
        </option>

    </select>

    <button onclick="carregarDados()">
        🔄 Atualizar
    </button>

</div>

<!-- MAPA -->

<div id="map"></div>

<script>

    // =========================================
    // LINK DA PLANILHA
    // =========================================

    const sheetURL =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vTOM8TKzlEsV-44u5CVmcQvMd70TZlOV6r-Y3YTqWtj0oWlFVuck-wbNU18JQEmHqEKfwd3gbIc_zvt/pub?output=csv";

    // =========================================
    // MAPA
    // =========================================

    const map = L.map('map').setView(
        [-4.252, -69.938],
        13
    );

    // =========================================
    // CAMADA
    // =========================================

    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            maxZoom: 20
        }
    ).addTo(map);

    // =========================================
    // CLUSTER
    // =========================================

    const markersLayer =
        L.markerClusterGroup();

    map.addLayer(markersLayer);

    // =========================================
    // ICONES
    // =========================================

    function criarIcone(cor){

        return L.divIcon({

            html: `
                <div style="
                    background:${cor};
                    width:18px;
                    height:18px;
                    border-radius:50%;
                    border:3px solid white;
                    box-shadow:0 0 5px rgba(0,0,0,0.5);
                "></div>
            `,

            className: ""

        });
    }

    const iconGreen =
        criarIcone("green");

    const iconRed =
        criarIcone("red");

    const iconOrange =
        criarIcone("orange");

    // =========================================
    // SEGURANÇA
    // =========================================

    function escapeHTML(str){

        return String(str || "")

            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    // =========================================
    // DASHBOARD
    // =========================================

    function atualizarDashboard(lista){

        let total = lista.length;

        let lic = 0;
        let irr = 0;
        let pend = 0;

        lista.forEach(est => {

            const status =
                String(est.Licenciado || "")
                .toLowerCase()
                .trim();

            if(status === "sim"){

                lic++;
            }
            else if(status === "pendente"){

                pend++;
            }
            else{

                irr++;
            }

        });

        document
            .getElementById("total")
            .innerText = total;

        document
            .getElementById("licenciados")
            .innerText = lic;

        document
            .getElementById("irregulares")
            .innerText = irr;

        document
            .getElementById("pendentes")
            .innerText = pend;
    }

    // =========================================
    // GPS USUARIO
    // =========================================

    navigator.geolocation.getCurrentPosition(

        pos => {

            const lat =
                pos.coords.latitude;

            const lng =
                pos.coords.longitude;

            L.circleMarker(
                [lat, lng],
                {
                    radius: 8
                }
            )
            .addTo(map)
            .bindPopup("📍 Sua localização");
        }

    );

    // =========================================
    // CARREGAR DADOS
    // =========================================

    async function carregarDados(){

        try{

            markersLayer.clearLayers();

            const response =
                await fetch(sheetURL);

            if(!response.ok){

                throw new Error(
                    "Erro ao carregar planilha"
                );
            }

            const csv =
                await response.text();

            const resultado =
                Papa.parse(csv, {

                    header: true,

                    skipEmptyLines: true
                });

            const dados =
                resultado.data;

            aplicarFiltros(dados);

        }
        catch(erro){

            console.error(erro);

            alert(
                "Erro ao carregar dados da planilha."
            );
        }
    }

    // =========================================
    // FILTROS
    // =========================================

    function aplicarFiltros(lista){

        markersLayer.clearLayers();

        const textoPesquisa =
            document
            .getElementById("pesquisa")
            .value
            .toLowerCase();

        const filtro =
            document
            .getElementById("filtro")
            .value
            .toLowerCase();

        const filtrados = lista.filter(est => {

            const nome =
                String(
                    est.NomeFantasia ||
                    est.Nome ||
                    ""
                )
                .toLowerCase();

            const status =
                String(
                    est.Licenciado || ""
                )
                .toLowerCase()
                .trim();

            const pesquisaOK =
                nome.includes(textoPesquisa);

            const statusOK =
                filtro === ""
                ? true
                : status === filtro;

            return pesquisaOK && statusOK;
        });

        atualizarDashboard(filtrados);

        filtrados.forEach(est => {

            const lat =
                parseFloat(est.Latitude);

            const lng =
                parseFloat(est.Longitude);

            if(
                isNaN(lat) ||
                isNaN(lng)
            ) return;

            let statusTexto =
                "Irregular";

            let statusClass =
                "status-irregular";

            let icon =
                iconRed;

            const status =
                String(est.Licenciado || "")
                .toLowerCase()
                .trim();

            if(status === "sim"){

                statusTexto =
                    "Licenciado";

                statusClass =
                    "status-licenciado";

                icon =
                    iconGreen;
            }

            else if(
                status === "pendente"
            ){

                statusTexto =
                    "Pendente";

                statusClass =
                    "status-pendente";

                icon =
                    iconOrange;
            }

            let foto =
                "Sem foto";

            if(
                est.Foto &&
                est.Foto.startsWith("http")
            ){

                foto = `
                    <img
                        class="popup-img"
                        src="${escapeHTML(est.Foto)}"
                    >
                `;
            }

            const popup = `

                <div class="popup-box">

                    <h3>
                        ${escapeHTML(
                            est.NomeFantasia ||
                            est.Nome
                        )}
                    </h3>

                    <small>

                        <b>Razão Social:</b>

                        ${escapeHTML(est.Nome)}

                    </small>

                    <hr>

                    <span class="${statusClass}">

                        ${statusTexto}

                    </span>

                    <br><br>

                    ${foto}

                    <br><br>

                    <b>📍 Endereço:</b><br>

                    ${escapeHTML(est.Endereco)}

                    <br><br>

                    <b>🏢 CNPJ:</b><br>

                    ${escapeHTML(est.CNPJ)}

                    <br><br>

                    <b>📂 Categoria:</b><br>

                    ${escapeHTML(est.Categoria)}

                </div>

            `;

            const marker = L.marker(

                [lat, lng],

                { icon }

            );

            marker.bindPopup(popup);

            markersLayer.addLayer(marker);

        });

        // AJUSTA ZOOM

        if(
            markersLayer.getLayers().length > 0
        ){

            map.fitBounds(
                markersLayer.getBounds()
            );
        }
    }

    // =========================================
    // EVENTOS
    // =========================================

    document
        .getElementById("pesquisa")
        .addEventListener(

            "input",

            () => carregarDados()
        );

    document
        .getElementById("filtro")
        .addEventListener(

            "change",

            () => carregarDados()
        );

    // =========================================
    // ATUALIZA AUTOMATICAMENTE
    // =========================================

    carregarDados();

    setInterval(

        carregarDados,

        300000

    );

</script>

</body>

</html>
